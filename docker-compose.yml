services:
  readaura:
    build: .
    image: readaura:latest
    container_name: readaura
    ports:
      - "3000:3000"
    environment:
      # Optional server-side fallback. The primary flow stores the NVIDIA
      # key in the user's browser via the Settings dialog.
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
    restart: unless-stopped
